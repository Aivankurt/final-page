<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Philippine Artistry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Cinzel:wght@700&family=Montserrat&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="index.html" style="font-family: 'Cinzel';">PH Artistry</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="tutorials.html">Tutorials</a></li>
                <li class="nav-item"><a class="nav-link" href="history.html">History</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container text-center py-5">
    <h1 class="home-title mb-3">Welcome!</h1>
    <p class="lead mb-5">Philippine Artistry Art Gallery</p>

    <div class="login-card mx-auto" style="max-width: 400px;">
        <h3 class="mb-4">Log-in</h3>
        <form id="loginForm">
            <div class="mb-3">
                <input type="text" id="user" class="form-control" placeholder="Username" required>
            </div>
            <div class="mb-3">
                <input type="password" id="pass" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn w-100" style="background: var(--primary-color); color: white;">Log In</button>
        </form>
    </div>
</div>

<footer class="footer">
    <p><i>"Art isn't all about the details but on how you show your imagination"</i></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === 'admin' && p === 'password') {
            window.location.href = 'history.html';
        } else {
            alert('Access Denied. Try admin/password');
        }
    });
</script>
</body>
</html>
