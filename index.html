<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Philippine Artistry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">Artistry</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link active" href="index.html">Home</a>
      <a class="nav-link" href="tutorials.html">Tutorials</a>
      <a class="nav-link" href="history.html">History</a>
    </div>
  </div>
</nav>

<main class="container">
    <div class="home-hero">
        <h1 class="home-title">Welcome!</h1>
        <p class="fst-italic">Philippine Artistry Art Gallery</p>
        
        <div class="login-card">
            <h3 class="mb-4">Log-in</h3>
            <form id="loginForm">
                <input type="text" id="user" class="form-control mb-3" placeholder="Username" required>
                <input type="password" id="pass" class="form-control mb-3" placeholder="Password" required>
                <button type="submit" class="btn btn-submit w-100">Log In</button>
            </form>
        </div>
    </div>
</main>

<footer class="footer">
    <p><i>"Art isn't all about the details but on how you show your imagination"</i></p>
</footer>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        if(document.getElementById('user').value === 'admin') {
            window.location.href = 'history.html';
        } else {
            alert('Try admin/password');
        }
    });
</script>
</body>
</html>
